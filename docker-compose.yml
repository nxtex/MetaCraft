version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: metacraft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-go/migrations:/docker-entrypoint-initdb.d
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: metacraft_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # console only (not exposed in prod)
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Backend Go (API Gateway + Auth) ─────────────────────────
  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: metacraft_go
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      PYTHON_SERVICE_URL: http://backend-python:8001
      R_SERVICE_URL: http://backend-r:8002
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      GIN_MODE: release
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
      - public
    expose:
      - "8000"

  # ─── Backend Python (Metadata extraction/edit) ───────────────
  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: metacraft_python
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "8001"

  # ─── Backend R (Batch analysis) ──────────────────────────────
  backend-r:
    build:
      context: ./backend-r
      dockerfile: Dockerfile
    container_name: metacraft_r
    restart: unless-stopped
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - internal
    expose:
      - "8002"

  # ─── Nginx (Reverse proxy) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: metacraft_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend-go
    networks:
      - public

volumes:
  postgres_data:
  minio_data:
  frontend_dist:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

secrets:
  jwt_private_key:
    file: ./secrets/jwt_private_key.pem
  jwt_public_key:
    file: ./secrets/jwt_public_key.pem
